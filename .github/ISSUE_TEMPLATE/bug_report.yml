name: Bug Report
description: バグの報告
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        バグの報告ありがとうございます。
        以下の項目に従って記入してください。
  - type: textarea
    id: description
    attributes:
      label: Description
      description: 何が起きているかの説明
      placeholder: "例: ログインボタンをクリックするとエラーが表示される"
    validations:
      required: true
  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce
      description: 再現手順
      placeholder: |
        1. ページを開く
        2. ログインボタンをクリック
        3. エラーが表示される
    validations:
      required: true
  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
      description: 本来どう動くべきか
      placeholder: "例: ログインが成功し、ダッシュボードに遷移する"
    validations:
      required: true
  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual Behavior
      description: 実際の動作（オプション）
      placeholder: "例: エラーメッセージが表示される"
    validations:
      required: false
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots/Videos
      description: スクリーンショットや動画（オプション）
    validations:
      required: false
  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: その他の情報（オプション）
    validations:
      required: false
