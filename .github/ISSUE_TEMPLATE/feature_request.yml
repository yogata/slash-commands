name: Feature Request
description: 機能リクエスト
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        機能リクエストありがとうございます。
        以下の項目に従って記入してください。
  - type: textarea
    id: summary
    attributes:
      label: Proposal Summary
      description: 機能の概要（一言で説明）
      placeholder: "例: ダークモードのサポート"
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: 解決したい課題
      placeholder: "例: 夜間に明るい画面が目に痛い"
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: 提案する解決策
      placeholder: "例: システム設定に応じて自動的にダークモードに切り替える"
    validations:
      required: true
  - type: textarea
    id: use-cases
    attributes:
      label: Use Cases
      description: 想定される使用例（オプション）
      placeholder: "例: 夜間の開発作業時"
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives
      description: 検討した代替案（オプション）
      placeholder: "例: 手動で切り替える"
    validations:
      required: false
  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: その他の情報（オプション）
    validations:
      required: false
